<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0a0a1a;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #container {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  #gameCanvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }
  #portrait-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,10,26,0.96);
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding: 20px;
  }
  #portrait-overlay .rotate-icon {
    font-size: 80px;
    margin-bottom: 24px;
    display: block;
    animation: tilt 2s ease-in-out infinite alternate;
  }
  #portrait-overlay p {
    font-size: 22px;
    color: #88ccff;
    line-height: 1.6;
  }
  @keyframes tilt {
    from { transform: rotate(-25deg); }
    to   { transform: rotate(25deg);  }
  }
  @media (orientation: portrait) and (max-width: 768px) {
    #portrait-overlay { display: flex; }
  }
</style>
</head>
<body>
<div id="portrait-overlay">
  <span class="rotate-icon">🔄</span>
  <p id="rotate-msg">Rotate your phone<br>for the best experience!</p>
</div>
<div id="container">
  <canvas id="gameCanvas"></canvas>
</div>
<script>
'use strict';

// ─── Language detection ───────────────────────────────────────────────────────
const isHebrew = /^he\b/i.test(
  (navigator.languages && navigator.languages[0]) || navigator.language || ''
);

if (isHebrew) {
  document.documentElement.lang = 'he';
  document.documentElement.dir  = 'rtl';
  document.getElementById('rotate-msg').innerHTML = 'סובב את הטלפון<br>לחוויה הטובה ביותר!';
} else {
  document.documentElement.lang = 'en';
  document.documentElement.dir  = 'ltr';
  document.title = 'Israel Wins — Roar of the Lion';
}

const L = isHebrew ? {
  title:        'ישראל מנצחת !',
  subtitle:     'שגרו אהבה לעם האירני — והביאו שלום',
  topTitle:     'ישראל מנצחת',
  yourBase:     '🏠 הבסיס שלך',
  israelSub:    '(ישראל)',
  sendLove:     '💕 שגרו אהבה!',
  iranSub:      '(העם האירני)',
  howToPlay:    'איך לשחק',
  moveLine:     'גרור צד שמאל — לשלוט בגובה',
  shootLine:    'הקש בצד ימין — לשגר אהבה לעם האירני',
  sendThese:    'שגרו את אלה:',
  dodgeThese:   'התחמק מאלה:',
  goal:         'מלא את סרגל ❤️ ל-1000 והבא שלום!',
  startBtn:     'לחצו להתחיל ▶',
  upBtn:        '↑',
  shootBtn:     '💕 שגרו',
  downBtn:      '↓',
  battlefield:  '✈️  שדה הקרב  ✈️',
  loveArrow:    'שגרו אהבה  →→→',
  lovePct:      p  => `💕 אהבה ${p}%`,
  shalom:       '🕊️ שלום! SHALOM! 🕊️',
  peaceBrought: t  => `הבאת שלום תוך ${t}!`,
  scoreLine:    s  => `ניקוד: ${s.toLocaleString()} נק׳`,
  alwaysWins:   'ישראל מנצחת תמיד!',
  shareTitle:   '🦁 ישראל מנצחת - שאגת הארי',
  sharePeace:   t  => `\u200Fהבאתי שלום תוך ${t}!\u200F`,
  shareScore:   s  => `ניקוד: ${s.toLocaleString()} נק׳`,
} : {
  title:        'Israel Wins!',
  subtitle:     'Send love to the people of Iran — bring PEACE!',
  topTitle:     'Israel Wins',
  yourBase:     '🏠 YOUR BASE',
  israelSub:    '(ISRAEL)',
  sendLove:     '💕 SEND LOVE!',
  iranSub:      '(IRAN)',
  howToPlay:    'HOW TO PLAY',
  moveLine:     'Drag left side — to steer up & down',
  shootLine:    'Tap right side — to send love to the people of Iran',
  sendThese:    'SEND THESE:',
  dodgeThese:   'DODGE THESE:',
  goal:         'Fill the ❤️ bar to 1000 and bring SHALOM!',
  startBtn:     '▶ TAP TO START',
  upBtn:        '↑',
  shootBtn:     '💕 SHOOT',
  downBtn:      '↓',
  battlefield:  '✈️  BATTLEFIELD  ✈️',
  loveArrow:    'SEND LOVE  →→→',
  lovePct:      p  => `💕 LOVE ${p}%`,
  shalom:       '🕊️ שלום! SHALOM! 🕊️',
  peaceBrought: t  => `You brought peace in ${t}!`,
  scoreLine:    s  => `Score: ${s.toLocaleString()} pts`,
  alwaysWins:   'Israel always wins!',
  shareTitle:   '🦁 Israel Wins — Roar of the Lion',
  sharePeace:   t  => `I brought PEACE in ${t}!`,
  shareScore:   s  => `Score: ${s.toLocaleString()} pts`,
};

// ─── Constants (logical 900×600 coordinate space) ────────────────────────────
const C = {
  W: 900, H: 600,
  TOP_BAR: 50, BOT_BAR: 80,
  PLAY_TOP: 50, PLAY_BOT: 520,
  GOAL_SCORE: 1000,
  SCORE_HIT:  50,
  SCORE_HURT: 30,
  DIFFICULTY_INTERVAL: 10000,
  ISRAEL_ZONE_X: 60, ISRAEL_ZONE_W: 300,
  IRAN_ZONE_X: 540,  IRAN_ZONE_W: 300,
  PLAYER_W: 70, PLAYER_H: 70,
  PROJ_SIZE: 32,
  ISRAEL_PROJS: ['💕','🌸','🦄','🐾','😊','🌈','⭐','🎀'],
  IRAN_PROJS:   ['💩','😡','💣','🔴'],
};

// ─── Responsive scaling (contain: full viewport canvas, game centered) ───────
const BASE_W = C.W, BASE_H = C.H;
let _gameScale = 1, _offsetX = 0, _offsetY = 0;

function resizeCanvas() {
  const vp = window.visualViewport || window;
  const vw = Math.round(vp.width  || window.innerWidth);
  const vh = Math.round(vp.height || window.innerHeight);
  // Fill height exactly — scale to vh, extend logical width to fill vw (no bars, no scroll)
  _gameScale = vh / BASE_H;
  C.W = Math.round(vw / _gameScale);
  C.IRAN_ZONE_X = C.W - C.IRAN_ZONE_W - 60;
  _offsetX = 0;
  _offsetY = 0;
  const canvas = document.getElementById('gameCanvas');
  canvas.width  = vw;
  canvas.height = vh;
  canvas.style.width  = vw + 'px';
  canvas.style.height = vh + 'px';
  if (window._game) {
    if (window._game.input) {
      window._game.input._gameScale = _gameScale;
      window._game.input._offsetX   = 0;
      window._game.input._offsetY   = 0;
    }
    const g = window._game;
    g._btnShare     = { x: C.W/2 - 255, y: 415, w: 240, h: 60 };
    g._btnAgain     = { x: C.W/2 + 15,  y: 415, w: 240, h: 60 };
    g._btnStart     = { x: C.W/2 - 150, y: 415, w: 300, h: 70 };
    g._btnMenuShare = { x: C.W/2 - 100, y: 500, w: 200, h: 40 };
    if (g.renderer) {
      g.renderer.stars = Array.from({length: 60}, () => ({
        x: rand(0, C.W), y: rand(C.PLAY_TOP, C.PLAY_BOT),
        r: rand(0.5, 2), a: rand(0.3, 1)
      }));
    }
  }
}
window.addEventListener('resize', resizeCanvas);
if (window.visualViewport) window.visualViewport.addEventListener('resize', resizeCanvas);

// ─── Asset images ─────────────────────────────────────────────────────────────
const IMG = {};
(function() {
  IMG.israel   = new Image(); IMG.israel.src   = 'assets/Israel.png';
  IMG.iran     = new Image(); IMG.iran.src     = 'assets/haminai.jpg';
  IMG.iranFlag = new Image(); IMG.iranFlag.src = 'assets/Iran.svg.webp';
})();

function drawFlagImg(ctx, img, cx, cy, height) {
  if (!img || !img.complete || !img.naturalWidth) return false;
  const w = height * (img.naturalWidth / img.naturalHeight);
  ctx.drawImage(img, cx - w / 2, cy - height / 2, w, height);
  return true;
}

// ─── RTL-aware text helper ────────────────────────────────────────────────────
// Use for all L.xxx labels so Hebrew direction is respected
function lText(ctx, text, x, y) {
  const prev = ctx.direction;
  ctx.direction = isHebrew ? 'rtl' : 'ltr';
  ctx.fillText(text, x, y);
  ctx.direction = prev;
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}
function circlesOverlap(x1, y1, r1, x2, y2, r2) {
  const dx = x1 - x2, dy = y1 - y2;
  return dx*dx + dy*dy < (r1 + r2) * (r1 + r2);
}
function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2,'0')}`;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
function randItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function drawRoundRect(ctx, x, y, w, h, r, fill, stroke, strokeW) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW || 2; ctx.stroke(); }
}

function drawButton(ctx, label, x, y, w, h, hot, fontSize) {
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur  = 10;
  ctx.shadowOffsetY = 4;

  if (hot) {
    const cx = x + w / 2, cy = y + h / 2;
    ctx.translate(cx, cy);
    ctx.scale(1.04, 1.04);
    ctx.translate(-cx, -cy);
  }

  const grad = ctx.createLinearGradient(x, y, x, y + h);
  if (hot) {
    grad.addColorStop(0, '#fffde0');
    grad.addColorStop(1, '#ffd700');
  } else {
    grad.addColorStop(0, '#263a5a');
    grad.addColorStop(1, '#1a2540');
  }
  drawRoundRect(ctx, x, y, w, h, 14, grad, hot ? '#ffd700' : '#4488cc', 2);

  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  ctx.fillStyle = hot ? '#111' : '#eee';
  ctx.font = `bold ${fontSize || 20}px Segoe UI, Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.direction = 'ltr';
  ctx.fillText(label, x + w / 2, y + h / 2);
  ctx.restore();
}

// ─── Flag drawing (fallback if images not loaded) ─────────────────────────────
function _drawStar(ctx, cx, cy, r, color) {
  ctx.fillStyle = color;
  for (let i = 0; i < 2; i++) {
    ctx.beginPath();
    for (let k = 0; k < 3; k++) {
      const angle = (k * 120 + i * 60) * Math.PI / 180;
      const px = cx + r * Math.sin(angle);
      const py = cy - r * Math.cos(angle);
      k === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
  }
}

function drawIsraelFlag(ctx, cx, cy, size) {
  const w = size * 1.5, h = size;
  const x = cx - w / 2, y = cy - h / 2;
  ctx.fillStyle = '#fff'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#0038b8';
  ctx.fillRect(x, y + h * 0.20, w, h * 0.18);
  ctx.fillRect(x, y + h * 0.62, w, h * 0.18);
  _drawStar(ctx, cx, cy, size * 0.28, '#0038b8');
  ctx.strokeStyle = '#aac0e0';
  ctx.lineWidth = Math.max(0.5, size * 0.02);
  ctx.strokeRect(x, y, w, h);
}

function drawIranFlag(ctx, cx, cy, size) {
  const w = size * 1.5, h = size;
  const x = cx - w / 2, y = cy - h / 2;
  ctx.fillStyle = '#239f40'; ctx.fillRect(x, y,             w, h / 3);
  ctx.fillStyle = '#fff';    ctx.fillRect(x, y + h / 3,     w, h / 3);
  ctx.fillStyle = '#da0000'; ctx.fillRect(x, y + h * 2 / 3, w, h / 3);
  ctx.strokeStyle = '#c8a000';
  ctx.lineWidth = Math.max(0.5, size * 0.02);
  ctx.strokeRect(x, y, w, h);
}

// ─── Particle ─────────────────────────────────────────────────────────────────
class Particle {
  constructor(x, y, emoji, vx, vy, life, size) {
    this.x = x; this.y = y;
    this.emoji = emoji;
    this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
    this.size = size || 20;
    this.alpha = 1;
  }
  update(dt) {
    this.x += this.vx * dt / 16;
    this.y += this.vy * dt / 16;
    this.vy += 0.15 * dt / 16;
    this.life -= dt;
    this.alpha = clamp(this.life / this.maxLife, 0, 1);
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.font = `${this.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.direction = 'ltr';
    ctx.fillText(this.emoji, this.x, this.y);
    ctx.restore();
  }
  get dead() { return this.life <= 0; }
}

class ParticleSystem {
  constructor() { this.particles = []; }
  spawn(x, y, emoji, vx, vy, life, size) {
    this.particles.push(new Particle(x, y, emoji, vx, vy, life, size));
  }
  spawnHit(x, y) {
    const emojis = ['💥','✨','💛','💫'];
    for (let i = 0; i < 5; i++) {
      this.spawn(x, y, randItem(emojis),
        rand(-3, 3), rand(-4, -1), rand(500, 900), rand(16, 24));
    }
  }
  spawnHurt(x, y) {
    for (let i = 0; i < 4; i++) {
      this.spawn(x, y, '💔', rand(-2, 2), rand(-3, -1), rand(400, 700), 20);
    }
  }
  spawnWinFlood(w, h) {
    const symbols = ['❤️','🕊️','🌸','💕','🌈','⭐','🎉','✨','🦋','🌺'];
    for (let i = 0; i < 80; i++) {
      this.spawn(rand(0, w), rand(0, h), randItem(symbols),
        rand(-2, 2), rand(-5, -1), rand(2000, 5000), rand(20, 36));
    }
  }
  update(dt) {
    for (const p of this.particles) p.update(dt);
    this.particles = this.particles.filter(p => !p.dead);
  }
  draw(ctx) { for (const p of this.particles) p.draw(ctx); }
}

// ─── Projectiles ──────────────────────────────────────────────────────────────
class Projectile {
  constructor(x, y, emoji) {
    this.x = x; this.y = y;
    this.emoji = emoji;
    this.size = C.PROJ_SIZE;
    this.alive = true;
  }
  get rect() { return { x: this.x - this.size/2, y: this.y - this.size/2, w: this.size, h: this.size }; }
  draw(ctx) {
    ctx.direction = 'ltr';
    ctx.font = `${this.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.emoji, this.x, this.y);
  }
}

class IsraelProjectile extends Projectile {
  constructor(x, y) {
    super(x, y, randItem(C.ISRAEL_PROJS));
    this.vx = 11; this.vy = 0;
  }
  update(dt) {
    this.x += this.vx * dt / 16;
    if (this.x > C.W + 30) this.alive = false;
  }
}

class IranProjectile extends Projectile {
  constructor(x, y, speedMult, unlockedTypes, targetY) {
    const pool = C.IRAN_PROJS.slice(0, unlockedTypes);
    super(x, y, randItem(pool));
    const spd = (5 + Math.random() * 3) * speedMult;
    this.vx = -spd;
    this.vy = 0;
    this.y = targetY + rand(-80, 80);
  }
  update(dt) {
    this.x += this.vx * dt / 16;
    if (this.x < -30) this.alive = false;
  }
}

// ─── Player ───────────────────────────────────────────────────────────────────
class Player {
  constructor() { this.reset(); }
  reset() {
    this.x = C.ISRAEL_ZONE_X + C.ISRAEL_ZONE_W / 2;
    this.y = C.H / 2;
    this.w = C.PLAYER_W;
    this.h = C.PLAYER_H;
    this.speed = 4;
    this.shootCooldown = 0;
    this.hurtFlash = 0;
  }
  get rect() { return { x: this.x - this.w/2, y: this.y - this.h/2, w: this.w, h: this.h }; }
  update(dt, input) {
    if (input.up)   this.y -= this.speed * dt / 16;
    if (input.down) this.y += this.speed * dt / 16;
    this.x = C.ISRAEL_ZONE_X + C.ISRAEL_ZONE_W / 2;
    this.y = clamp(this.y, C.PLAY_TOP + 10 + this.h/2, C.PLAY_BOT - 10 - this.h/2);
    if (this.shootCooldown > 0) this.shootCooldown -= dt;
    if (this.hurtFlash > 0)    this.hurtFlash -= dt;
  }
  canShoot() { return this.shootCooldown <= 0; }
  shoot() {
    this.shootCooldown = 350;
    return new IsraelProjectile(this.x + this.w/2, this.y);
  }
  draw(ctx) {
    ctx.save();
    if (this.hurtFlash > 0) {
      ctx.globalAlpha = 0.5 + 0.5 * Math.sin(this.hurtFlash / 80 * Math.PI);
    }
    if (!drawFlagImg(ctx, IMG.israel, this.x, this.y, C.PLAYER_H))
      drawIsraelFlag(ctx, this.x, this.y, C.PLAYER_H);
    ctx.restore();
  }
}

// ─── Renderer ─────────────────────────────────────────────────────────────────
class Renderer {
  constructor(ctx) {
    this.ctx = ctx;
    this.stars = Array.from({length: 60}, () => ({
      x: rand(0, C.W), y: rand(C.PLAY_TOP, C.PLAY_BOT),
      r: rand(0.5, 2), a: rand(0.3, 1)
    }));
  }

  drawBackground(lovePercent) {
    const ctx = this.ctx;
    const grad = ctx.createLinearGradient(0, C.PLAY_TOP, 0, C.PLAY_BOT);
    grad.addColorStop(0, '#0d1b2a');
    grad.addColorStop(1, '#1a2744');
    ctx.fillStyle = grad;
    ctx.fillRect(0, C.PLAY_TOP, C.W, C.PLAY_BOT - C.PLAY_TOP);

    for (const s of this.stars) {
      ctx.globalAlpha = s.a;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.fillStyle = 'rgba(30,120,40,0.55)';
    ctx.fillRect(C.ISRAEL_ZONE_X, C.PLAY_BOT - 36, C.ISRAEL_ZONE_W, 36);
    ctx.fillStyle = 'rgba(160,100,30,0.55)';
    ctx.fillRect(C.IRAN_ZONE_X, C.PLAY_BOT - 36, C.IRAN_ZONE_W, 36);
    ctx.fillStyle = 'rgba(10,20,40,0.4)';
    const israelEnd = C.ISRAEL_ZONE_X + C.ISRAEL_ZONE_W;
    ctx.fillRect(israelEnd, C.PLAY_BOT - 36, C.IRAN_ZONE_X - israelEnd, 36);

    ctx.strokeStyle = 'rgba(60,120,200,0.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(israelEnd, C.PLAY_TOP);
    ctx.lineTo(israelEnd, C.PLAY_BOT);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(C.IRAN_ZONE_X, C.PLAY_TOP);
    ctx.lineTo(C.IRAN_ZONE_X, C.PLAY_BOT);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.save();
    const midX = (israelEnd + C.IRAN_ZONE_X) / 2;
    const pulse2 = 0.5 + 0.5 * Math.sin(Date.now() / 500);
    ctx.globalAlpha = 0.3 + 0.3 * pulse2;
    ctx.font = 'bold 20px Arial';
    ctx.fillStyle = '#ffee88';
    lText(ctx, L.loveArrow, midX, (C.PLAY_TOP + C.PLAY_BOT) / 2);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  drawIsraelZone(ctx) {
    ctx.save();
    ctx.shadowBlur = 30;
    ctx.shadowColor = 'rgba(0,160,255,0.5)';
    drawRoundRect(ctx, C.ISRAEL_ZONE_X + 10, C.PLAY_TOP + 10, C.ISRAEL_ZONE_W - 20, C.PLAY_BOT - C.PLAY_TOP - 20,
      12, 'rgba(0,80,160,0.30)', '#1e90ff', 2);
    ctx.restore();

// ─── SoundManager ─────────────────────────────────────────────────────────────
class SoundManager {
  constructor() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { this.ctx = null; }
  }
  _play(freq, type, duration, vol, delay) {
    if (!this.ctx) return;
    try {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.connect(g); g.connect(this.ctx.destination);
      o.type = type || 'sine';
      o.frequency.setValueAtTime(freq, this.ctx.currentTime + (delay||0));
      g.gain.setValueAtTime(vol || 0.3, this.ctx.currentTime + (delay||0));
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + (delay||0) + duration);
      o.start(this.ctx.currentTime + (delay||0));
      o.stop(this.ctx.currentTime + (delay||0) + duration);
    } catch(e) {}
  }
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
  shoot()  { this._play(880, 'sine', 0.12, 0.2); this._play(1100, 'sine', 0.1, 0.15, 0.05); }
  hit()    { [523,659,784].forEach((f,i) => this._play(f, 'triangle', 0.18, 0.25, i*0.06)); }
  hurt()   { this._play(150, 'sawtooth', 0.25, 0.3); }
  win()    {
    const notes = [523,659,784,1047,1319,1568];
    notes.forEach((f,i) => this._play(f, 'triangle', 0.4, 0.3, i * 0.1));
  }
}

// ─── ShareCard ────────────────────────────────────────────────────────────────
class ShareCard {
  static generate(score, elapsed) {
    const w = 600, h = 400;
    const oc = document.createElement('canvas');
    oc.width = w; oc.height = h;
    const ctx = oc.getContext('2d');

    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, '#0d1b2a');
    grad.addColorStop(1, '#1a2744');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    drawRoundRect(ctx, 10, 10, w - 20, h - 20, 16, null, '#ffd700', 3);

    ctx.direction = isHebrew ? 'rtl' : 'ltr';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.font = 'bold 30px Arial';
    ctx.fillStyle = '#ffd700';
    ctx.shadowBlur = 16; ctx.shadowColor = '#ffd700';
    ctx.fillText(L.shareTitle, w / 2, 80);
    ctx.shadowBlur = 0;

    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(40, 115); ctx.lineTo(w - 40, 115); ctx.stroke();

    if (!drawFlagImg(ctx, IMG.israel, w / 2 - 150, 185, 26))
      drawIsraelFlag(ctx, w / 2 - 150, 185, 26);
    ctx.font = 'bold 24px Arial';
    ctx.fillStyle = '#aaffcc';
    ctx.fillText(L.sharePeace(formatTime(elapsed)), w / 2 + 10, 185);

    ctx.font = 'bold 28px Arial';
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 12; ctx.shadowColor = '#fff';
    ctx.fillText('🕊️  SHALOM ACHIEVED  🕊️', w / 2, 270);
    ctx.shadowBlur = 0;

    ctx.strokeStyle = '#ffd700';
    ctx.beginPath(); ctx.moveTo(40, 310); ctx.lineTo(w - 40, 310); ctx.stroke();

    return oc;
  }

  static share(score, elapsed) {
    gtag('event', 'share', { method: 'result', content_type: 'score_card', score: score, time: formatTime(elapsed) });
    const url = 'https://tinyurl.com/IsraelWinsGame';
    const text = isHebrew
      ? `שיחקתי "ישראל מנצחת" — הבאתי שלום תוך ${formatTime(elapsed)}! 🕊️\nשחקו גם אתם:`
      : `I played Israel Wins — brought PEACE in ${formatTime(elapsed)}! 🕊️\nPlay too:`;
    const textWithUrl = text + '\n' + url;
    const card = ShareCard.generate(score, elapsed);
    // Convert synchronously to keep iOS user-gesture context alive
    const dataUrl = card.toDataURL('image/png');
    const bin = atob(dataUrl.split(',')[1]);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    const blob = new Blob([buf], { type: 'image/png' });
    const file = new File([blob], 'israel-wins.png', { type: 'image/png' });
    // 1. Try share with image + text (URL embedded in text; don't pass url param with files — breaks WhatsApp/Android)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ title: L.shareTitle, text: textWithUrl, files: [file] })
        .catch(() => {
          // File share failed — fall back to text+URL share
          if (navigator.share) {
            navigator.share({ title: L.shareTitle, text, url }).catch(() => {});
          }
          ShareCard._download(card);
        });
      return;
    }
    // 2. Try share with text + URL only (no file support)
    if (navigator.share) {
      navigator.share({ title: L.shareTitle, text, url }).catch(() => {
        navigator.clipboard && navigator.clipboard.writeText(textWithUrl).catch(() => {});
      });
      ShareCard._download(card);
      return;
    }
    // 3. Clipboard copy + download
    if (navigator.clipboard) {
      navigator.clipboard.writeText(textWithUrl).catch(() => {});
    }
    ShareCard._download(card);
  }

  static shareGame() {
    gtag('event', 'share', { method: 'game_link', content_type: 'game' });
    const url = 'https://tinyurl.com/IsraelWinsGame';
    const text = isHebrew
      ? 'שחקו "ישראל מנצחת" - שגרו אהבה והביאו לשלום'
      : 'Play Israel Wins — Send love and bring peace!';
    if (navigator.share) {
      navigator.share({ title: L.shareTitle, text, url }).catch(() => {});
    } else {
      navigator.clipboard && navigator.clipboard.writeText(text + '\n' + url).catch(() => {});
    }
  }

  static _download(canvas) {
    const a = document.createElement('a');
    a.download = 'israel-wins.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }
}

// ─── InputHandler ─────────────────────────────────────────────────────────────
class InputHandler {
  constructor(canvas, game) {
    this.canvas = canvas;
    this.game = game;
    this.keys = {};
    this._gameScale = 1;
    this._offsetX   = 0;
    this._offsetY   = 0;

    document.addEventListener('keydown', e => {
      this.keys[e.code] = true;
      if (e.code === 'Space') { e.preventDefault(); game.onAction('shoot'); }
      if (e.code === 'Space' && game.state !== 'PLAYING') game.onAction('start');
      if (e.code === 'Escape' && game.state === 'PLAYING') game._reset();
    });
    document.addEventListener('keyup', e => { this.keys[e.code] = false; });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        const rect = canvas.getBoundingClientRect();
        const screenX = t.clientX - rect.left;
        const pt = this._toCanvas(t);
        game.onTouchStart(t.identifier, screenX, pt.x, pt.y);
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        const pt = this._toCanvas(t);
        game.onTouchMove(t.identifier, pt.x, pt.y);
      }
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        game.onTouchEnd(t.identifier);
      }
    }, { passive: false });

    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const screenX = e.clientX - rect.left;
      const pt = this._toCanvas(e);
      game.onClick(screenX, pt.x, pt.y);
    });
  }

  _toCanvas(e) {
    const rect = this.canvas.getBoundingClientRect();
    const gs = this._gameScale || 1;
    const ox = this._offsetX || 0;
    const oy = this._offsetY || 0;
    return {
      x: (e.clientX - rect.left - ox) / gs,
      y: (e.clientY - rect.top  - oy) / gs,
    };
  }

  get up()    { return !!this.keys['ArrowUp']    || !!this.keys['KeyW']; }
  get down()  { return !!this.keys['ArrowDown']  || !!this.keys['KeyS']; }
  get shoot() { return !!this.keys['Space']; }
}

// ─── Game ─────────────────────────────────────────────────────────────────────
class Game {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx    = canvas.getContext('2d');
    this.renderer  = new Renderer(this.ctx);
    this.particles = new ParticleSystem();
    this.sound     = new SoundManager();
    this.player    = new Player();
    this.input     = new InputHandler(canvas, this);

    this.israelProjs = [];
    this.iranProjs   = [];

    this.state   = 'START';
    this.score   = 0;
    this.elapsed = 0;

    this.iranShootTimer    = 0;
    this.iranShootInterval = 1400;
    this.iranSpeedMult     = 1.2;
    this.diffTimer         = 0;
    this.unlockedTypes     = 2;
    this.iranEnemy = { y: (C.PLAY_TOP + C.PLAY_BOT) / 2, vy: 1 };
    this._hardMode = false;

    this._btnShare     = { x: C.W/2 - 255, y: 415, w: 240, h: 60 };
    this._btnAgain     = { x: C.W/2 + 15,  y: 415, w: 240, h: 60 };
    this._btnStart     = { x: C.W/2 - 150, y: 415, w: 300, h: 70 };
    this._btnMenuShare = { x: C.W/2 - 100, y: 500, w: 200, h: 40 };

    this._leftTouchId = null;
    this._lastTime = null;
    this._raf = requestAnimationFrame(ts => this._loop(ts));

    resizeCanvas();
  }

  onAction(action) {
    this.sound.resume();
    if (this.state === 'START' && (action === 'start' || action === 'shoot')) {
      this._startGame();
      return;
    }
    if (this.state !== 'PLAYING') return;
    if (action === 'shoot') this._playerShoot();
  }

  // Left half of SCREEN = drag to move; right half = shoot
  onTouchStart(id, screenX, logicalX, logicalY) {
    this.sound.resume();
    if (this.state === 'START') {
      const bs = this._btnStart, ms = this._btnMenuShare;
      if (logicalX >= bs.x && logicalX <= bs.x+bs.w && logicalY >= bs.y && logicalY <= bs.y+bs.h)
        this._startGame();
      else if (logicalX >= ms.x && logicalX <= ms.x+ms.w && logicalY >= ms.y && logicalY <= ms.y+ms.h)
        ShareCard.shareGame();
      return;
    }
    if (this.state === 'WIN') {
      const s = this._btnShare, a = this._btnAgain;
      if (logicalX >= s.x && logicalX <= s.x+s.w && logicalY >= s.y && logicalY <= s.y+s.h) ShareCard.share(this.score, this.elapsed);
      if (logicalX >= a.x && logicalX <= a.x+a.w && logicalY >= a.y && logicalY <= a.y+a.h) { gtag('event', 'play_again'); this._reset(); }
      return;
    }
    if (this.state !== 'PLAYING') return;

    if (screenX < this.canvas.width / 2) {
      // Left half — drag to control height
      this._leftTouchId = id;
      this.player.y = clamp(logicalY, C.PLAY_TOP + 10 + this.player.h / 2, C.PLAY_BOT - 10 - this.player.h / 2);
    } else {
      // Right half — shoot
      this._playerShoot();
    }
  }

  onTouchMove(id, logicalX, logicalY) {
    if (this.state !== 'PLAYING') return;
    if (id === this._leftTouchId) {
      this.player.y = clamp(logicalY, C.PLAY_TOP + 10 + this.player.h / 2, C.PLAY_BOT - 10 - this.player.h / 2);
    }
  }

  onTouchEnd(id) {
    if (id === this._leftTouchId) this._leftTouchId = null;
  }

  onClick(screenX, logicalX, logicalY) {
    this.sound.resume();
    if (this.state === 'START') {
      const bs = this._btnStart, ms = this._btnMenuShare;
      if (logicalX >= bs.x && logicalX <= bs.x+bs.w && logicalY >= bs.y && logicalY <= bs.y+bs.h)
        this._startGame();
      else if (logicalX >= ms.x && logicalX <= ms.x+ms.w && logicalY >= ms.y && logicalY <= ms.y+ms.h)
        ShareCard.shareGame();
      return;
    }
    if (this.state === 'WIN') {
      const s = this._btnShare, a = this._btnAgain;
      if (logicalX >= s.x && logicalX <= s.x+s.w && logicalY >= s.y && logicalY <= s.y+s.h) ShareCard.share(this.score, this.elapsed);
      if (logicalX >= a.x && logicalX <= a.x+a.w && logicalY >= a.y && logicalY <= a.y+a.h) { gtag('event', 'play_again'); this._reset(); }
      return;
    }
    // Desktop click: right half = shoot
    if (this.state === 'PLAYING' && screenX >= this.canvas.width / 2) this._playerShoot();
  }

  _startGame() {
    gtag('event', 'game_start');
    this._reset();
    this.state = 'PLAYING';
    this._lastTime = null;
    // Push history state so back button returns to start screen
    history.pushState({ playing: true }, '');
    // Try to go fullscreen on mobile
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    if (req) req.call(el).catch(() => {});
  }

  _reset() {
    this.state   = 'START';
    this.score   = 0;
    this.elapsed = 0;
    this.israelProjs = [];
    this.iranProjs   = [];
    this.particles   = new ParticleSystem();
    this.player.reset();
    this.iranShootTimer    = 0;
    this.iranShootInterval = 1400;
    this.iranSpeedMult     = 1.2;
    this.diffTimer         = 0;
    this.unlockedTypes     = 2;
    this.iranEnemy = { y: (C.PLAY_TOP + C.PLAY_BOT) / 2, vy: 1 };
    this._hardMode = false;
    this._leftTouchId = null;
    this._lastTime = null;
  }

  _playerShoot() {
    if (!this.player.canShoot()) return;
    const proj = this.player.shoot();
    this.israelProjs.push(proj);
    this.sound.shoot();
  }

  _iranShoot() {
    const x = C.IRAN_ZONE_X + C.IRAN_ZONE_W / 2;
    this.iranProjs.push(new IranProjectile(x, this.iranEnemy.y,
      this.iranSpeedMult, this.unlockedTypes, this.player.y));
  }

  _win() {
    this.state = 'WIN';
    gtag('event', 'game_win', {
      score: this.score,
      elapsed_seconds: Math.round(this.elapsed)
    });
    this.particles.spawnWinFlood(C.W, C.H);
    this.sound.win();
  }

  _update(dt) {
    if (this.state !== 'PLAYING') return;

    this.elapsed += dt;
    this.diffTimer += dt;

    if (this.diffTimer >= C.DIFFICULTY_INTERVAL) {
      this.diffTimer -= C.DIFFICULTY_INTERVAL;
      this.iranSpeedMult     += 0.25;
      this.iranShootInterval = Math.max(600, this.iranShootInterval - 250);
      if (this.unlockedTypes < C.IRAN_PROJS.length) this.unlockedTypes++;
    }

    if (!this._hardMode && this.score >= 750) {
      this._hardMode = true;
      this.iranSpeedMult     += 0.6;
      this.iranShootInterval = Math.max(400, this.iranShootInterval - 350);
    }

    this.player.update(dt, this.input);
    if (this.input.shoot && this.player.canShoot()) this._playerShoot();

    this.iranShootTimer += dt;
    if (this.iranShootTimer >= this.iranShootInterval) {
      this.iranShootTimer = 0;
      this._iranShoot();
    }

    const enemySpd = 1.8 * this.iranSpeedMult;
    this.iranEnemy.y += this.iranEnemy.vy * enemySpd * dt / 16;
    const enemyHalf = 56;
    if (this.iranEnemy.y < C.PLAY_TOP + 10 + enemyHalf) { this.iranEnemy.y = C.PLAY_TOP + 10 + enemyHalf; this.iranEnemy.vy =  1; }
    if (this.iranEnemy.y > C.PLAY_BOT - 10 - enemyHalf) { this.iranEnemy.y = C.PLAY_BOT - 10 - enemyHalf; this.iranEnemy.vy = -1; }

    for (const p of this.israelProjs) p.update(dt);
    for (const p of this.iranProjs)   p.update(dt);

    const PROJ_R  = C.PROJ_SIZE * 0.45;
    const ENEMY_R = 30;
    const enemyX  = C.IRAN_ZONE_X + C.IRAN_ZONE_W / 2;
    for (const p of this.israelProjs) {
      if (!p.alive) continue;
      if (circlesOverlap(p.x, p.y, PROJ_R, enemyX, this.iranEnemy.y, ENEMY_R)) {
        p.alive = false;
        this.score = Math.min(C.GOAL_SCORE, this.score + C.SCORE_HIT);
        this.particles.spawnHit(p.x, p.y);
        this.sound.hit();
        if (this.score >= C.GOAL_SCORE) { this._win(); return; }
      }
    }

    const PLAYER_R = 22;
    for (const p of this.iranProjs) {
      if (!p.alive) continue;
      if (circlesOverlap(p.x, p.y, PROJ_R, this.player.x, this.player.y, PLAYER_R)) {
        p.alive = false;
        this.score = Math.max(0, this.score - C.SCORE_HURT);
        this.player.hurtFlash = 500;
        this.particles.spawnHurt(p.x, p.y);
        this.sound.hurt();
      }
    }

    this.israelProjs = this.israelProjs.filter(p => p.alive);
    this.iranProjs   = this.iranProjs.filter(p => p.alive);
    this.particles.update(dt);
  }

  _draw() {
    const ctx = this.ctx;
    // Fill full viewport (covers letterbox bars outside game area)
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    // Transform to logical 900×600 game space (centered, no distortion)
    ctx.save();
    ctx.translate(_offsetX, _offsetY);
    ctx.scale(_gameScale, _gameScale);
    ctx.direction = 'ltr'; // prevent RTL document from reversing number rendering

    const lp  = clamp(this.score / C.GOAL_SCORE, 0, 1);

    if (this.state === 'START') {
      this.renderer.drawBackground(0);
      this.renderer.drawStartScreen(ctx);
      this.particles.draw(ctx);
      ctx.restore();
      return;
    }

    this.renderer.drawBackground(lp);
    this.renderer.drawIsraelZone(ctx);
    this.renderer.drawIranZone(ctx, lp, this.iranEnemy.y, this.score);
    this.renderer.drawLoveMeter(ctx, lp);

    for (const p of this.israelProjs) p.draw(ctx);
    for (const p of this.iranProjs)   p.draw(ctx);

    this.player.draw(ctx);
    this.particles.draw(ctx);

    this.renderer.drawTopBar(ctx, this.score, this.elapsed);
    this.renderer.drawBottomBar(ctx, this.input, this._leftTouchId !== null);

    if (this.state === 'WIN') {
      this.renderer.drawWinScreen(ctx, this.score, this.elapsed, this._btnShare, this._btnAgain);
    }

    ctx.restore();
  }

  _loop(ts) {
    if (this._lastTime === null) this._lastTime = ts;
    const dt = Math.min(ts - this._lastTime, 50);
    this._lastTime = ts;
    this._update(dt);
    this._draw();
    this._raf = requestAnimationFrame(t => this._loop(t));
  }
}

// ─── Back button → return to start screen ────────────────────────────────────
window.addEventListener('popstate', () => {
  if (window._game && window._game.state === 'PLAYING') {
    window._game._reset();
  }
});

// ─── Bootstrap ────────────────────────────────────────────────────────────────
window.onload = () => {
  resizeCanvas();
  const canvas = document.getElementById('gameCanvas');
  window._game = new Game(canvas);
};
</script>
</body>
</html>
